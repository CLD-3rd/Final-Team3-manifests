apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubecost
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"   # cluster-bootstrap(0), karpenter(1) 이후
spec:
  project: default
  source:
    repoURL: https://kubecost.github.io/cost-analyzer
    chart: cost-analyzer
    targetRevision: 1.104.0
    helm:
      values: |
        prometheus:
          enabled: false
        grafana:
          enabled: false
        global:
          prometheus:
            fqdn: prometheus-kube-prometheus-stack.monitoring.svc.cluster.local
          grafana:
            fqdn: grafana.monitoring.svc.cluster.local
        kubecostFrontend:
          ingress:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
