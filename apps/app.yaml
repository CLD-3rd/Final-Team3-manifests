apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: matchfit-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    repoURL: https://github.com/CLD-3rd/Final-Team3-manifests.git
    targetRevision: feat/s3-irsa
    path: overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: argocd-backend
      namespace: argocd
      jsonPointers:
        - /spec/replicas
