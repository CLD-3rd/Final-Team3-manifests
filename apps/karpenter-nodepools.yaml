apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter-nodepools
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  source:
    repoURL: https://github.com/CLD-3rd/Final-Team3-manifests.git
    targetRevision: develop
    path: base/karpenter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
