# k6 스크립트를 ConfigMap으로 만들어 Job에서 마운트해서 실행
# - namespace는 템플릿에서 지정하지 않고, Application.destination.namespace로 통일 관리 권장
apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-script                   # Job에서 참조하는 이름과 동일해야 함
data:
  script.js: |-
{{ .Values.script | nindent 4 }}    # values.yaml의 script를 안전하게 들여쓰기해 삽입
