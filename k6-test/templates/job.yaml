 apiVersion: batch/v1
 kind: Job
 metadata:
   name: {{ include "k6-test.fullname" . }}
 spec:
   template:
     spec:
       containers:
         - name: k6
           image: grafana/k6:latest
           command: ["k6", "run", "/scripts/test.js"]
           volumeMounts:
             - name: k6-script
               mountPath: /scripts
       restartPolicy: Never
       volumes:
         - name: k6-script
           configMap:
             name: {{ include "k6-test.fullname" . }}-script
   backoffLimit: 0
