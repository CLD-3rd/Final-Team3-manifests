testMode: full  # smoke | full

script: |-
  import http from 'k6/http';
  import { check, sleep } from 'k6';

  export const options = {
    scenarios: {
      steady_rps: {
        executor: 'ramping-arrival-rate',
        startRate: 0,
        timeUnit: '1s',
        preAllocatedVUs: 100,
        maxVUs: 500,
        stages: [
          { target: 20, duration: '30s' },    // 빠른 ramp
          { target: 100, duration: '1m' },    // 1분 내 200 RPS 도달
          { target: 100, duration: '10m' },   // 10분간 steady
          { target: 0, duration: '30s' },     // 종료
        ]
      }
    },
    thresholds: {
      http_req_duration: ['p(95)<1000'],
      http_req_failed:   ['rate<0.05'],
    },
    ext: {
      output: {
        'prometheus-remote': {
          address: 'http://kube-prometheus-stack-prometheus.monitoring.svc:9090/api/v1/write',
        }
      }
    }
  };

  const BASE_URL = 'https://backend.match-fit.store';
  const ENDPOINTS = [
    '/api/posts/1'
  ];

  export default function () {
    for (const path of ENDPOINTS) {
      const res = http.get(`${BASE_URL}${path}`);
      check(res, { [`GET ${path} status 200`]: (r) => r.status === 200 });
    }
    // arrival-rate가 RPS를 제어하므로 불필요한 sleep 제거
    sleep(0);
  }


script_full: |-
  import http from 'k6/http';
  import { check, sleep } from 'k6';

  export const options = {
    scenarios: {
      ramp_to_2000_rps: {
        executor: 'ramping-arrival-rate',
        startRate: 0,
        timeUnit: '1s',
        preAllocatedVUs: 800,
        maxVUs: 5000,
        stages: [
          { target: 100, duration: '1m' },   // 예열
          { target: 800, duration: '2m' },  // 2분에 2000 RPS로 ramp-up
          { target: 800, duration: '8m' },  // 8분간 steady
          { target: 0, duration: '1m' },     // 종료
        ]
      }
    },
    thresholds: {
      http_req_duration: ['p(95)<1000'],
      http_req_failed:   ['rate<0.05'],
    },
    ext: {
      output: {
        'prometheus-remote': {
          address: 'http://kube-prometheus-stack-prometheus.monitoring.svc:9090/api/v1/write',
        }
      }
    }
  };

  const BASE_URL = 'https://backend.match-fit.store';

  const SPORTS = [
    'FOOTBALL',
    'BASKETBALL',
    'BADMINTON',
    'TABLE_TENNIS',
    'VOLLEYBALL',
    'TENNIS'
  ];

  const GENDERS = [
    'MALE',
    'FEMALE',
    'ALL'
  ];

  const SORT_TYPES = [
    'DATE',
    'POPULAR'
  ];

  // 날짜 범위 2025-08-23 ~ 2025-08-30
  function getRandomDate() {
    const start = new Date('2025-08-23');
    const end = new Date('2025-08-30');
    const randomTime = start.getTime() + Math.random() * (end.getTime() - start.getTime());
    const dateObj = new Date(randomTime);
    const yyyy = dateObj.getFullYear();
    const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
    const dd = String(dateObj.getDate()).padStart(2, '0');
    return `${yyyy}-${mm}-${dd}`;
  }

  export default function () {
    const sport = SPORTS[Math.floor(Math.random() * SPORTS.length)];
    const gender = GENDERS[Math.floor(Math.random() * GENDERS.length)];
    const sortType = SORT_TYPES[Math.floor(Math.random() * SORT_TYPES.length)];
    const date = getRandomDate();

    const url = `${BASE_URL}/api/posts/list?sports=${sport}&gender=${gender}&sortType=${sortType}&date=${date}`;

    const res = http.get(url);

    if (res.status !== 200) {
      console.log(`Failed request: ${url} - Status: ${res.status}`);
      console.log(`Response body: ${res.body}`);
    }

    check(res, {
      'status is 200': (r) => r.status === 200
    });

    // arrival-rate가 RPS를 제어하므로 sleep 제거하여 최대한의 요청을 보냄
    sleep(0);
  }
