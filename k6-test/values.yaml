config:
  script: |-
    import http from 'k6/http';
    import { check, sleep, group } from 'k6';

    const BASE_URL = 'https://backend.match-fit.store';

    export let options = {
      vus: 10,
      duration: '1m',
      thresholds: {
        http_req_failed: ['rate<0.01'], // 실패율 1% 미만
        http_req_duration: ['p(95)<1000'], // 95% 요청은 1초 이하
      },
    };

    export default function () {
      group('1. 메인 모집글 조회', function () {
        const res = http.get(`${BASE_URL}/api/posts/list?sports=축구&gender=남성&sortType=최신순&date=2025-08-20`);
        check(res, {
          'list status is 200': (r) => r.status === 200,
        });
        sleep(1);
      });

      group('2. 로그인 시도', function () {
        const payload = JSON.stringify({
          email: 'testuser@example.com',
          password: 'Test1234!',
        });
        const params = {
          headers: { 'Content-Type': 'application/json' },
        };
        const res = http.post(`${BASE_URL}/api/user/login`, payload, params);
        check(res, {
          'login status is 200': (r) => r.status === 200,
          'login includes token': (r) => r.json('accessToken') !== undefined,
        });
        sleep(Math.random() * 3 + 1); // 1~4초 랜덤 wait
      });

      group('3. 캘린더 모집 일정 조회', function () {
        const res = http.get(`${BASE_URL}/api/posts/calender?month=2025-08`);
        check(res, {
          'calendar status is 200': (r) => r.status === 200,
        });
        sleep(1);
      });

      group('4. 모집글 상세 조회 (임의 ID)', function () {
        const res = http.get(`${BASE_URL}/api/posts/1`);
        check(res, {
          'post detail status is 200': (r) => r.status === 200,
        });
        sleep(1);
      });
    }
