apiVersion: batch/v1              # Job 리소스는 일시적인 작업을 정의할 때 사용하는 Kubernetes 리소스
kind: Job
metadata:
  name: backend-load              # Job 이름
  namespace: argocd              # Job이 배포될 네임스페이스 (backend 서비스가 있는 곳과 같아야 함)
spec:
  template:
    spec:
      containers:
        - name: load-generator    # 컨테이너 이름
          image: busybox          # 부하를 유발하기 위한 간단한 Linux 기반 이미지 사용
          command: ["/bin/sh"]    # 셸을 실행하여 명령 수행
          args:
            - -c
            - "while true; do wget -q -O- http://backend.argocd.svc.cluster.local; done"
            # - 무한 루프를 돌면서 backend 서비스로 HTTP 요청을 계속 보냄
            # - wget -q -O-: 응답을 출력 없이 받아오는 명령
            # - backend.default.svc.cluster.local: 클러스터 내부 DNS로 backend 서비스의 ClusterIP 주소
            #   이 경로를 통해 backend 파드로 요청이 전달되며 CPU 사용률 상승 유도
      restartPolicy: Never         # 컨테이너가 실패하더라도 재시작하지 않음 (Job의 기본 동작)
  backoffLimit: 1                 # 실패 시 재시도 횟수 (1번까지 시도)
