apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    metadata:
      labels:  # 모든 노드에 적용
        project: matchfit
        team: team-3
      annotations:  # 모든 노드에 적용
        match-fit.store/owner: team-3
        match-fit.store/description: "Matchfit project dev environment"
    spec:
      nodeClassRef:  # 클라우드 제공자의 NodeClass 리소스를 참조함. 클라우드 제공자별 문서를 참조
        group: karpenter.k8s.aws  # 단일 버전만 제공되므로 업데이트됨
        kind: EC2NodeClass
        name: default  # 참조하는 NodeClass 리소스 이름
      requirements:
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["t", "m", "r"]
        - key: "karpenter.k8s.aws/instance-family"
          operator: In
          values: ["t3", "t3a", "m5", "r5"]  # t4g(arm64)도 고려
        - key: karpenter.k8s.aws/instance-size
          operator: NotIn
          values: ["nano", "micro", "small"] # 일부 유형 제외
        - key: "karpenter.k8s.aws/instance-cpu"
          operator: In
          values: ["2", "4"]
        - key: karpenter.k8s.aws/instance-generation  # 제거해도 무방
          operator: Gt
          values: ["2"]
        - key: "topology.kubernetes.io/zone"
          operator: In
          values: ["ap-northeast-2a", "ap-northeast-2b", "ap-northeast-2c"]  # 상황에 맞게 설정
        - key: kubernetes.io/arch
          operator: In
          values: ["arm64", "amd64"]  # 이미지에 맞게 설정(워크플로우 확인)
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]        # 상황에 맞게 설정
          # values: ["spot", "on-demand"]  # 상황에 맞게 설정
      expireAfter: 720h # 참고: 이 값을 NodePool에서 변경하면 NodeClaim과 차이가 발생할 수 있음
  disruption:  # Karpenter가 통합(consolidation) 대상으로 고려할 노드의 유형을 설명
    consolidationPolicy: WhenEmptyOrUnderutilized  # 비어 있거나 충분히 활용되지 않는 모든 노드를 통합 대상으로 고려
    consolidateAfter: 1m  # 파드가 노드에 추가되거나 제거된 후 노드를 통합하기까지 Karpenter가 대기할 시간
    budgets:
    - nodes: 10%  # 동시에 정지되거나 교체될 수 있는 노드는 80%
  limits:  # 최대 한도
    cpu: "100"
    memory: 200Gi
