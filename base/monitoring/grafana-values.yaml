grafana:
  serviceAccount:
    create: false
    name: grafana-sa
  env:
    GF_INSTALL_PLUGINS: grafana-athena-datasource
    
  # Grafana provisioning / dashboard sidecar (kube-prometheus-stack 지원)
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard     # ConfigMap에 붙일 레이블 키 (아래 ConfigMap과 일치시킬 것)
      folder: /var/lib/grafana/dashboards/default
      searchNamespace: ALL        # ConfigMaps가 다른 namespace에 있으면 변경 고려
      # optional:
      # refreshInterval: 10s
      
    datasources:
      enabled: true
      label: grafana_datasource
      searchNamespace: ALL
      folder: /etc/grafana/provisioning/datasources

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          options:
            path: /var/lib/grafana/dashboards/default


alertmanager:
  config:
    global:
      resolve_timeout: 5m
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'dngl1232@gmail.com'
      smtp_auth_username: 'dngl1232@gmail.com'
      smtp_auth_password: 'GMAIL_APP_PASSWORD'
      smtp_require_tls: true

    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      receiver: 'all-team'
      routes:
      - match:
          severity: critical
        receiver: 'critical-all-team'
        continue: true
      - match:
          severity: warning
        receiver: 'warning-all-team'

    inhibit_rules:
    - source_match:
        severity: 'critical'
      target_match:
        severity: 'warning'
      equal: ['alertname', 'pod']

    receivers:
    - name: 'all-team'
      email_configs:
      - to: 'dngl1232@gmail.com'
        headers:
          Subject: '[MatchFit Monitoring] {{ .GroupLabels.alertname }} - {{ .Status | toUpper }}'
        html: |
          <h2>MatchFit Alert: {{ .GroupLabels.alertname }}</h2>
          <p><b>Status:</b> {{ .Status | toUpper }}</p>
          <p><b>Cluster:</b> matchfit-eks</p>
          <p><b>Time:</b> {{ now.Format "2006-01-02 15:04:05" }}</p>
          
          <h3>Alert Details:</h3>
          {{ range .Alerts }}
          <div style="border: 1px solid #ddd; padding: 10px; margin: 10px 0;">
            <p><b>Alert:</b> {{ .Annotations.summary }}</p>
            <p><b>Description:</b> {{ .Annotations.description }}</p>
            <p><b>Started:</b> {{ .StartsAt.Format "2006-01-02 15:04:05" }}</p>
            
            <p><b>Labels:</b></p>
            <ul>
              {{ range .Labels.SortedPairs }}
              <li><b>{{ .Name }}:</b> {{ .Value }}</li>
              {{ end }}
            </ul>
            
            {{ if .Annotations.dashboard_url }}
            <p><a href="{{ .Annotations.dashboard_url }}" style="color: #007bff;">View Dashboard</a></p>
            {{ end }}
            {{ if .Annotations.runbook_url }}
            <p><a href="{{ .Annotations.runbook_url }}" style="color: #28a745;">View Runbook</a></p>
            {{ end }}
          </div>
          {{ end }}

    - name: 'critical-all-team'
      email_configs:
      - to: 'dngl1232@gmail.com'
        headers:
          Subject: 'CRITICAL ALERT - {{ .GroupLabels.alertname }}'
          Priority: 'high'
        html: |
          <div style="background-color: #f8d7da; border: 1px solid #f5c6cb; padding: 15px; border-radius: 5px;">
            <h2 style="color: #721c24;">CRITICAL ALERT: {{ .GroupLabels.alertname }}</h2>
            <p><b>Status:</b> {{ .Status | toUpper }}</p>
            <p><b>Cluster:</b> matchfit-eks</p>
            <p><b>Time:</b> {{ now.Format "2006-01-02 15:04:05" }}</p>
            
            <h3 style="color: #721c24;">즉시 대응이 필요합니다!</h3>
          </div>
          
          {{ range .Alerts }}
          <div style="border: 2px solid #dc3545; padding: 15px; margin: 15px 0; border-radius: 5px;">
            <h4 style="color: #dc3545;">{{ .Annotations.summary }}</h4>
            <p><b>Description:</b> {{ .Annotations.description }}</p>
            <p><b>Started:</b> {{ .StartsAt.Format "2006-01-02 15:04:05" }}</p>
            
            {{ if .Labels.node }}
            <p><b>Node:</b> {{ .Labels.node }}</p>
            {{ end }}
            {{ if .Labels.pod }}
            <p><b>Pod:</b> {{ .Labels.pod }}</p>
            {{ end }}
            {{ if .Labels.namespace }}
            <p><b>Namespace:</b> {{ .Labels.namespace }}</p>
            {{ end }}
            {{ if .Labels.uri }}
            <p><b>API Endpoint:</b> {{ .Labels.uri }}</p>
            {{ end }}
            
            {{ if .Annotations.dashboard_url }}
            <p><a href="{{ .Annotations.dashboard_url }}" style="color: #007bff; font-weight: bold;">View Dashboard</a></p>
            {{ end }}
            {{ if .Annotations.runbook_url }}
            <p><a href="{{ .Annotations.runbook_url }}" style="color: #28a745; font-weight: bold;">View Runbook</a></p>
            {{ end }}
          </div>
          {{ end }}

    - name: 'warning-all-team'
      email_configs:
      - to: 'dngl1232@gmail.com'
        headers:
          Subject: 'WARNING - {{ .GroupLabels.alertname }}'
        html: |
          <div style="background-color: #fff3cd; border: 1px solid #ffeaa7; padding: 15px; border-radius: 5px;">
            <h2 style="color: #856404;">WARNING: {{ .GroupLabels.alertname }}</h2>
            <p><b>Status:</b> {{ .Status | toUpper }}</p>
            <p><b>Cluster:</b> matchfit-eks</p>
            <p><b>Time:</b> {{ now.Format "2006-01-02 15:04:05" }}</p>
            
            <h3 style="color: #856404;">모니터링이 필요합니다</h3>
          </div>
          
          {{ range .Alerts }}
          <div style="border: 1px solid #ffc107; padding: 10px; margin: 10px 0; border-radius: 5px;">
            <h4 style="color: #856404;">{{ .Annotations.summary }}</h4>
            <p><b>Description:</b> {{ .Annotations.description }}</p>
            <p><b>Started:</b> {{ .StartsAt.Format "2006-01-02 15:04:05" }}</p>
            
            {{ if .Labels.node }}
            <p><b>Node:</b> {{ .Labels.node }}</p>
            {{ end }}
            {{ if .Labels.pod }}
            <p><b>Pod:</b> {{ .Labels.pod }}</p>
            {{ end }}
            {{ if .Labels.namespace }}
            <p><b>Namespace:</b> {{ .Labels.namespace }}</p>
            {{ end }}
            {{ if .Labels.uri }}
            <p><b>API Endpoint:</b> {{ .Labels.uri }}</p>
            {{ end }}
            
            {{ if .Annotations.dashboard_url }}
            <p><a href="{{ .Annotations.dashboard_url }}" style="color: #007bff;">View Dashboard</a></p>
            {{ end }}
          </div>
          {{ end }}
