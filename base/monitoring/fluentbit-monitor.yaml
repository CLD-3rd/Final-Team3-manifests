apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: fluentbit-monitor
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: fluentbit
  namespaceSelector:
    matchNames:
      - monitoring
  endpoints:
    - port: http
      path: /api/v1/metrics/prometheus
      interval: 15s
      scrapeTimeout: 10s
#  fluentbit가 설치된 파드의 매트릭을 수집하는 것
