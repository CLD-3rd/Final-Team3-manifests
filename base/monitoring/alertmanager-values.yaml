alertmanager:
  config:
    global:
      resolve_timeout: 5m
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'dngl1232@gmail.com'
      smtp_auth_username: 'dngl1232@gmail.com'
      smtp_auth_password: 'GMAIL_APP_PASSWORD'
      smtp_require_tls: true

    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 1m
      group_interval: 2m
      repeat_interval: 10m
      receiver: 'all-team'
      routes:
      - match:
          severity: critical
        receiver: 'critical-alerts'
        group_interval: 1m
        repeat_interval: 10m
      - match:
          severity: warning
        receiver: 'warning-alerts'
        group_interval: 2m
        repeat_interval: 10m

    inhibit_rules:
    - source_match:
        severity: 'critical'
      target_match:
        severity: 'warning'
      equal: ['alertname', 'pod']

    receivers:
    - name: 'all-team'
      email_configs:
      - to: 'dngl1232@gmail.com'
        headers:
          subject: '[MatchFit Monitoring] {{ .GroupLabels.alertname }} - {{ .Status | toUpper }}'
        text: |-
          알림 이름: {{ .GroupLabels.alertname }}
          상태: {{ .Status }}
          클러스터: matchfit-eks
          시간: {{ now.Format "2006-01-02 15:04:05" }}

          상세 정보:
          {{ range .Alerts }}
          - {{ .Annotations.summary }}
          - {{ .Annotations.description }}
          - 시작 시간: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}

    - name: 'critical-alerts'
      email_configs:
      - to: 'dngl1232@gmail.com'
        headers:
          subject: '[MatchFit Monitoring] CRITICAL - {{ .GroupLabels.alertname }}'
        text: |-
          위험 알림이 발생했습니다!

          알림 이름: {{ .GroupLabels.alertname }}
          상태: {{ .Status }}
          클러스터: matchfit-eks
          시간: {{ now.Format "2006-01-02 15:04:05" }}

          상세 정보:
          {{ range .Alerts }}
          - 요약: {{ .Annotations.summary }}
          - 설명: {{ .Annotations.description }}
          - 시작 시간: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ if .Labels.node }}- 노드: {{ .Labels.node }}{{ end }}
          {{ if .Labels.pod }}- Pod: {{ .Labels.pod }}{{ end }}
          {{ if .Labels.namespace }}- Namespace: {{ .Labels.namespace }}{{ end }}
          {{ end }}

    - name: 'warning-alerts'
      email_configs:
      - to: 'dngl1232@gmail.com'
        headers:
          subject: '[MatchFit Monitoring] WARNING - {{ .GroupLabels.alertname }}'
        text: |-
          경고 알림이 발생했습니다.

          알림 이름: {{ .GroupLabels.alertname }}
          상태: {{ .Status }}
          클러스터: matchfit-eks
          시간: {{ now.Format "2006-01-02 15:04:05" }}

          상세 정보:
          {{ range .Alerts }}
          - 요약: {{ .Annotations.summary }}
          - 설명: {{ .Annotations.description }}
          - 시작 시간: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ if .Labels.node }}- 노드: {{ .Labels.node }}{{ end }}
          {{ if .Labels.pod }}- Pod: {{ .Labels.pod }}{{ end }}
          {{ if .Labels.namespace }}- Namespace: {{ .Labels.namespace }}{{ end }}
          {{ end }}
