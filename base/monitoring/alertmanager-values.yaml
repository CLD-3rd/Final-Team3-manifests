alertmanager:
  config:
    global:
      resolve_timeout: 5m
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'dngl1232@gmail.com'
      smtp_auth_username: 'dngl1232@gmail.com'
      smtp_auth_password: 'GMAIL_APP_PASSWORD'
      smtp_require_tls: true

    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 1m
      group_interval: 10m
      repeat_interval: 10m
      receiver: 'all-team'
      routes:
      - match:
          severity: critical
        receiver: 'critical-alerts'
        group_interval: 10m
        repeat_interval: 10m
      - match:
          severity: warning
        receiver: 'warning-alerts'
        group_interval: 10m
        repeat_interval: 10m

    inhibit_rules:
    - source_match:
        severity: 'critical'
      target_match:
        severity: 'warning'
      equal: ['alertname', 'pod']

    receivers:
    - name: 'all-team'
      email_configs:
      - to: 'dngl1232@gmail.com'
        headers:
          subject: '[MatchFit Monitoring] {{ .GroupLabels.alertname }} - {{ .Status | toUpper }}'
        html: |
          <h2>MatchFit Alert: {{ .GroupLabels.alertname }}</h2>
          <p><b>Status:</b> {{ .Status | toUpper }}</p>
          <p><b>Cluster:</b> matchfit-eks</p>
          <h3>Alert Details:</h3>
          {{ range .Alerts }}
          <div style="border:1px solid #ddd;padding:10px;margin:10px 0;">
            <p><b>Summary:</b> {{ if .Annotations.summary }}{{ .Annotations.summary }}{{ else }}N/A{{ end }}</p>
            <p><b>Description:</b> {{ if .Annotations.description }}{{ .Annotations.description }}{{ else }}N/A{{ end }}</p>
            <p><b>Started:</b> {{ .StartsAt | humanizeTimestamp }}</p>
            <ul>
              {{ if .Labels.node }}<li><b>Node:</b> {{ .Labels.node }}</li>{{ end }}
              {{ if .Labels.pod }}<li><b>Pod:</b> {{ .Labels.pod }}</li>{{ end }}
              {{ if .Labels.namespace }}<li><b>Namespace:</b> {{ .Labels.namespace }}</li>{{ end }}
            </ul>
          </div>
          {{ end }}

    - name: 'critical-alerts'
      email_configs:
      - to: 'dngl1232@gmail.com'
        headers:
          subject: '[MatchFit Monitoring] CRITICAL - {{ .GroupLabels.alertname }}'
        html: |
          <div style="background-color:#f8d7da;border:1px solid #f5c6cb;padding:15px;">
            <h2 style="color:#721c24;">🚨 CRITICAL ALERT 🚨</h2>
            <p><b>Alert:</b> {{ .GroupLabels.alertname }}</p>
            <p><b>Status:</b> {{ .Status | toUpper }}</p>
            <p><b>Cluster:</b> matchfit-eks</p>
          </div>
          {{ range .Alerts }}
          <div style="border:2px solid #dc3545;padding:10px;margin:10px 0;">
            <p><b>Summary:</b> {{ if .Annotations.summary }}{{ .Annotations.summary }}{{ else }}N/A{{ end }}</p>
            <p><b>Description:</b> {{ if .Annotations.description }}{{ .Annotations.description }}{{ else }}N/A{{ end }}</p>
            <p><b>Started:</b> {{ .StartsAt | humanizeTimestamp }}</p>
            {{ if .Labels.node }}<p><b>Node:</b> {{ .Labels.node }}</p>{{ end }}
            {{ if .Labels.pod }}<p><b>Pod:</b> {{ .Labels.pod }}</p>{{ end }}
            {{ if .Labels.namespace }}<p><b>Namespace:</b> {{ .Labels.namespace }}</p>{{ end }}
          </div>
          {{ end }}


    - name: 'warning-alerts'
      email_configs:
      - to: 'dngl1232@gmail.com'
        headers:
          subject: '[MatchFit Monitoring] WARNING - {{ .GroupLabels.alertname }}'
        html: |
          <div style="background-color:#fff3cd;border:1px solid #ffeaa7;padding:15px;">
            <h2 style="color:#856404;">⚠ WARNING ALERT ⚠</h2>
            <p><b>Alert:</b> {{ .GroupLabels.alertname }}</p>
            <p><b>Status:</b> {{ .Status | toUpper }}</p>
            <p><b>Cluster:</b> matchfit-eks</p>
          </div>
          {{ range .Alerts }}
          <div style="border:1px solid #ffc107;padding:10px;margin:10px 0;">
            <p><b>Summary:</b> {{ if .Annotations.summary }}{{ .Annotations.summary }}{{ else }}N/A{{ end }}</p>
            <p><b>Description:</b> {{ if .Annotations.description }}{{ .Annotations.description }}{{ else }}N/A{{ end }}</p>
            <p><b>Started:</b> {{ .StartsAt | humanizeTimestamp }}</p>
            {{ if .Labels.node }}<p><b>Node:</b> {{ .Labels.node }}</p>{{ end }}
            {{ if .Labels.pod }}<p><b>Pod:</b> {{ .Labels.pod }}</p>{{ end }}
            {{ if .Labels.namespace }}<p><b>Namespace:</b> {{ .Labels.namespace }}</p>{{ end }}
          </div>
          {{ end }}

