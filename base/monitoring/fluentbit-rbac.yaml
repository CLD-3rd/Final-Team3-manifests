apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluentbit-clusterrole
  labels:
    app: fluentbit
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "pods/logs", "nodes", "nodes/proxy"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes/stats"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluentbit-clusterrolebinding
  labels:
    app: fluentbit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluentbit-clusterrole
subjects:
  - kind: ServiceAccount
    name: fluent-bit-sa
    namespace: monitoring
