# CloudFront 전용 CloudWatch Exporter
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudwatchexporter-cloudfront-config
  namespace: monitoring
data:
  config.yml: |
    region: us-east-1
    period_seconds: 60
    delay_seconds: 120
    metrics:
    - aws_namespace: AWS/CloudFront
      aws_metric_name: Requests
      aws_dimensions: [DistributionId, Region]
      aws_dimension_select:
        DistributionId: ["E1LSL9C78M0LB6"]
        Region: ["Global"]
      aws_statistics: [Sum]

    - aws_namespace: AWS/CloudFront
      aws_metric_name: BytesDownloaded
      aws_dimensions: [DistributionId, Region]
      aws_dimension_select:
        DistributionId: ["E1LSL9C78M0LB6"]
        Region: ["Global"]
      aws_statistics: [Sum]

    - aws_namespace: AWS/CloudFront
      aws_metric_name: BytesUploaded
      aws_dimensions: [DistributionId, Region]
      aws_dimension_select:
        DistributionId: ["E1LSL9C78M0LB6"]
        Region: ["Global"]
      aws_statistics: [Sum]

    - aws_namespace: AWS/CloudFront
      aws_metric_name: 4xxErrorRate
      aws_dimensions: [DistributionId, Region]
      aws_dimension_select:
        DistributionId: ["E1LSL9C78M0LB6"]
        Region: ["Global"]
      aws_statistics: [Average]

    - aws_namespace: AWS/CloudFront
      aws_metric_name: 5xxErrorRate
      aws_dimensions: [DistributionId, Region]
      aws_dimension_select:
        DistributionId: ["E1LSL9C78M0LB6"]
        Region: ["Global"]
      aws_statistics: [Average]

    - aws_namespace: AWS/CloudFront
      aws_metric_name: CacheHitRate
      aws_dimensions: [DistributionId, Region]
      aws_dimension_select:
        DistributionId: ["E1LSL9C78M0LB6"]
        Region: ["Global"]
      aws_statistics: [Average]

---
# CloudFront Exporter Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudwatchexporter-cloudfront
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudwatchexporter-cloudfront
  template:
    metadata:
      labels:
        app: cloudwatchexporter-cloudfront
    spec:
      containers:
      - name: cloudwatch-exporter
        image: quay.io/prometheus/cloudwatch-exporter:v0.15.5
        args:
          - /config/config.yml
        ports:
        - containerPort: 9106
          name: http
        volumeMounts:
        - name: config
          mountPath: /config
          readOnly: true
        env:
        - name: AWS_REGION
          value: us-east-1
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
      volumes:
      - name: config
        configMap:
          name: cloudwatchexporter-cloudfront-config
      serviceAccountName: cloudwatchexporter-sa

---
# CloudFront Service
apiVersion: v1
kind: Service
metadata:
  name: cloudwatchexporter-cloudfront-svc
  namespace: monitoring
  labels:
    app: cloudwatchexporter-cloudfront
spec:
  ports:
  - port: 9106
    targetPort: 9106
    name: http
  selector:
    app: cloudwatchexporter-cloudfront

---
# CloudFront ServiceMonitor
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cloudwatchexporter-cloudfront-monitor
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: cloudwatchexporter-cloudfront
  namespaceSelector:
    matchNames:
      - monitoring
  endpoints:
    - port: http
      interval: 60s
      path: /metrics
