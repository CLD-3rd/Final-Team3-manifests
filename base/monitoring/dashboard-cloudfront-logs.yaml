              "format": 0,
              "rawSQL": "SELECT \n    CASE \n        WHEN sc_status = 200 THEN 'HTTP 200 (Success)'\n        WHEN sc_status = 304 THEN 'HTTP 304 (Not Modified)'\n        WHEN sc_status = 404 THEN 'HTTP 404 (Not Found)'\n        WHEN sc_status BETWEEN 500 AND 599 THEN 'HTTP 5xx (Server Error)'\n        WHEN sc_status BETWEEN 400 AND 499 THEN 'HTTP 4xx (Client Error)'\n        ELSE CONCAT('HTTP ', CAST(sc_status AS VARCHAR))\n    END AS status_label,\n    COUNT(*) AS value\nFROM cloudfront_logs\nWHERE date >= date_format(current_date - interval '1' day, '%Y-%m-%d')\nGROUP BY 1\nORDER BY value DESC",
              "refId": "A"
            }
          ],
          "title": "HTTP Status Code Distribution",
          "type": "piechart"
