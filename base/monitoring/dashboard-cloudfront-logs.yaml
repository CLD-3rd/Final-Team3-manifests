                "uid": "athena"
              },
              "format": 0,
              "rawSQL": "SELECT \n    CASE \n        WHEN cs_user_agent LIKE '%bot%' OR cs_user_agent LIKE '%crawler%' OR cs_user_agent LIKE '%spider%' THEN 'Bot/Crawler'\n        WHEN cs_user_agent LIKE '%Mobile%' OR cs_user_agent LIKE '%Android%' OR cs_user_agent LIKE '%iPhone%' THEN 'Mobile Browser'\n        WHEN cs_user_agent LIKE '%curl%' OR cs_user_agent LIKE '%wget%' OR cs_user_agent LIKE '%python%' OR cs_user_agent LIKE '%postman%' THEN 'Automated Tools'\n        WHEN cs_user_agent LIKE '%Chrome%' OR cs_user_agent LIKE '%Firefox%' OR cs_user_agent LIKE '%Safari%' THEN 'Desktop Browser'\n        ELSE 'Other/Unknown'\n    END as client_type,\n    COUNT(*) as requests\nFROM cloudfront_logs\nWHERE date >= date_format(current_date - interval '1' day, '%Y-%m-%d')\nGROUP BY CASE \n        WHEN cs_user_agent LIKE '%bot%' OR cs_user_agent LIKE '%crawler%' OR cs_user_agent LIKE '%spider%' THEN 'Bot/Crawler'\n        WHEN cs_user_agent LIKE '%Mobile%' OR cs_user_agent LIKE '%Android%' OR cs_user_agent LIKE '%iPhone%' THEN 'Mobile Browser'\n        WHEN cs_user_agent LIKE '%curl%' OR cs_user_agent LIKE '%wget%' OR cs_user_agent LIKE '%python%' OR cs_user_agent LIKE '%postman%' THEN 'Automated Tools'\n        WHEN cs_user_agent LIKE '%Chrome%' OR cs_user_agent LIKE '%Firefox%' OR cs_user_agent LIKE '%Safari%' THEN 'Desktop Browser'\n        ELSE 'Other/Unknown'\n    END\nORDER BY requests DESC",
              "refId": "A"
            }
