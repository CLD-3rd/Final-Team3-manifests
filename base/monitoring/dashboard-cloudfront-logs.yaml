              },
              "datasource": {
                "type": "grafana-athena-datasource",
                "uid": "athena"
              },
              "format": 0,
              "rawSQL": "SELECT \n    CASE \n        WHEN ssl_protocol = 'TLSv1.3' THEN 'TLS 1.3 (Secure)'\n        WHEN ssl_protocol = 'TLSv1.2' THEN 'TLS 1.2 (Good)'\n        WHEN ssl_protocol = 'TLSv1.1' THEN 'TLS 1.1 (Deprecated)'\n        WHEN ssl_protocol = 'TLSv1' OR ssl_protocol = 'TLSv1.0' THEN 'TLS 1.0 (Insecure)'\n        WHEN ssl_protocol = 'SSLv3' THEN 'SSL 3.0 (Very Insecure)'\n        WHEN ssl_protocol = 'SSLv2' THEN 'SSL 2.0 (Very Insecure)'\n        WHEN ssl_protocol = '-' OR ssl_protocol IS NULL THEN 'Unknown/Not Recorded'\n        ELSE CONCAT('Other: ', ssl_protocol)\n    END as ssl_version,\n    COUNT(*) as requests\nFROM cloudfront_logs\nWHERE date >= date_format(current_date - interval '1' day, '%Y-%m-%d')\nGROUP BY ssl_protocol\nORDER BY requests DESC",
              "refId": "A"
            }
