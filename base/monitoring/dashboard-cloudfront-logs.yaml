              "format": 0,
              "rawSQL": "SELECT \n    COALESCE(x_forwarded_for, c_ip) as client_ip,\n    COUNT(*) as request_count,\n    COUNT(DISTINCT cs_uri_stem) as unique_paths,\n    SUM(CASE WHEN sc_status = 404 THEN 1 ELSE 0 END) as not_found_count,\n    SUM(CASE WHEN sc_status >= 400 THEN 1 ELSE 0 END) as error_count\nFROM cloudfront_logs\nWHERE date >= date_format(current_date - interval '1' day, '%Y-%m-%d')\nGROUP BY COALESCE(x_forwarded_for, c_ip)\nHAVING COUNT(*) > 1000 OR SUM(CASE WHEN sc_status = 404 THEN 1 ELSE 0 END) > 50 OR SUM(CASE WHEN sc_status >= 400 THEN 1 ELSE 0 END) > 100\nORDER BY COUNT(*) DESC\nLIMIT 20",
