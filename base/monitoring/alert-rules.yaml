apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: alert-rules
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
    prometheus: kube-prometheus-stack
    role: alert-rules
spec:
  groups:
  
  # EKS 인프라 알림
  - name: eks-infrastructure
    interval: 30s
    rules:
    
    # EKS Node가 Ready 상태가 아님
    - alert: EKSNodeNotReady
      expr: kube_node_status_condition{condition="Ready",status="true"} == 0
      for: 2m
      labels:
        severity: critical
        team: devops
        component: eks
        environment: production
        cluster: matchfit-eks
      annotations:
        summary: "EKS Node가 Ready 상태가 아님"
        description: "Node {{$labels.node}}가 Ready 상태가 아닙니다. 즉시 확인이 필요합니다."

    # EKS Node CPU 과다 사용 (Warning: 85%)
    - alert: EKSNodeHighCPU
      expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
      for: 10m
      labels:
        severity: warning
        team: devops
        component: eks
        environment: production
        cluster: matchfit-eks
      annotations:
        summary: "EKS Node CPU 사용률 높음"
        description: "Node {{$labels.instance}}의 CPU 사용률이 {{$value | printf \"%.1f\"}}%입니다. 임계값: 85%"

    # EKS Node CPU 매우 높음 (Critical: 95%)
    - alert: EKSNodeCriticalCPU
      expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 95
      for: 5m
      labels:
        severity: critical
        team: devops
        component: eks
        environment: production
        cluster: matchfit-eks
      annotations:
        summary: "EKS Node CPU 사용률 매우 높음"
        description: "Node {{$labels.instance}}의 CPU 사용률이 {{$value | printf \"%.1f\"}}%로 매우 높습니다."

    # EKS Node 메모리 과다 사용 (Warning: 85%)
    - alert: EKSNodeHighMemory
      expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
      for: 10m
      labels:
        severity: warning
        team: devops
        component: eks
        environment: production
        cluster: matchfit-eks
      annotations:
        summary: "EKS Node 메모리 사용률 높음"
        description: "Node {{$labels.instance}}의 메모리 사용률이 {{$value | printf \"%.1f\"}}%입니다. 임계값: 85%"

    # EKS Node 메모리 매우 높음 (Critical: 95%)
    - alert: EKSNodeCriticalMemory
      expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 95
      for: 5m
      labels:
        severity: critical
        team: devops
        component: eks
        environment: production
        cluster: matchfit-eks
      annotations:
        summary: "EKS Node 메모리 사용률 매우 높음"
        description: "Node {{$labels.instance}}의 메모리 사용률이 {{$value | printf \"%.1f\"}}%로 매우 높습니다."

    # EKS Node 디스크 사용률 높음 (Warning: 85%)
    - alert: EKSNodeHighDisk
      expr: (1 - (node_filesystem_avail_bytes{fstype!="tmpfs",mountpoint="/"} / node_filesystem_size_bytes{fstype!="tmpfs",mountpoint="/"})) * 100 > 85
      for: 5m
      labels:
        severity: warning
        team: devops
        component: eks
        environment: production
        cluster: matchfit-eks
      annotations:
        summary: "EKS Node 디스크 사용률 높음"
        description: "Node {{$labels.instance}}의 루트 디스크 사용률이 {{$value | printf \"%.1f\"}}%입니다. 임계값: 85%"

    # Pod 재시작 빈발 (1시간에 3회 이상)
    - alert: EKSPodRestartingFrequently
      expr: increase(kube_pod_container_status_restarts_total[1h]) > 3
      for: 5m
      labels:
        severity: warning
        team: devops
        component: eks
        environment: production
        cluster: matchfit-eks
      annotations:
        summary: "EKS Pod 재시작 빈발"
        description: "Pod {{$labels.namespace}}/{{$labels.pod}}가 지난 1시간 동안 {{$value}}번 재시작했습니다."

    # Pod OOMKilled
    - alert: EKSPodOOMKilled
      expr: increase(kube_pod_container_status_terminated_reason{reason="OOMKilled"}[5m]) > 0
      for: 0m
      labels:
        severity: critical
        team: devops
        component: eks
        environment: production
        cluster: matchfit-eks
      annotations:
        summary: "EKS Pod OOMKilled 발생"
        description: "Pod {{$labels.namespace}}/{{$labels.pod}}의 컨테이너가 메모리 부족으로 종료되었습니다."

  # MatchFit Backend 애플리케이션 알림
  - name: matchfit-backend
    interval: 15s
    rules:
    
    # MatchFit Backend Pod CPU 사용률 높음 (Warning: 85%)
    - alert: MatchFitBackendHighCPU
      expr: |
        (
          sum(rate(container_cpu_usage_seconds_total{namespace="argocd", pod=~".*backend.*"}[5m])) by (pod)
          /
          sum(kube_pod_container_resource_limits{namespace="argocd", pod=~".*backend.*", resource="cpu"}) by (pod)
        ) * 100 > 85
      for: 5m
      labels:
        severity: warning
        team: backend
        app: matchfit
        component: spring-boot
        environment: production
        service: matchfit-backend
      annotations:
        summary: "MatchFit Backend CPU 사용률 높음"
        description: "MatchFit Backend Pod {{$labels.pod}}의 CPU 사용률이 {{$value | printf \"%.1f\"}}%입니다. 임계값: 85%"

    # MatchFit Backend Pod CPU 매우 높음 (Critical: 95%)
    - alert: MatchFitBackendCriticalCPU
      expr: |
        (
          sum(rate(container_cpu_usage_seconds_total{namespace="argocd", pod=~".*backend.*"}[5m])) by (pod)
          /
          sum(kube_pod_container_resource_limits{namespace="argocd", pod=~".*backend.*", resource="cpu"}) by (pod)
        ) * 100 > 95
      for: 2m
      labels:
        severity: critical
        team: backend
        app: matchfit
        component: spring-boot
        environment: production
        service: matchfit-backend
      annotations:
        summary: "MatchFit Backend CPU 사용률 매우 높음"
        description: "MatchFit Backend Pod {{$labels.pod}}의 CPU 사용률이 {{$value | printf \"%.1f\"}}%로 매우 높습니다."

    # MatchFit Backend Pod 메모리 높음 (Warning: 85%)
    - alert: MatchFitBackendHighMemory
      expr: |
        (
          sum(container_memory_working_set_bytes{namespace="argocd", pod=~".*backend.*"}) by (pod)
          /
          sum(kube_pod_container_resource_limits{namespace="argocd", pod=~".*backend.*", resource="memory"}) by (pod)
        ) * 100 > 85
      for: 5m
      labels:
        severity: warning
        team: backend
        app: matchfit
        component: spring-boot
        environment: production
        service: matchfit-backend
      annotations:
        summary: "MatchFit Backend 메모리 사용률 높음"
        description: "MatchFit Backend Pod {{$labels.pod}}의 메모리 사용률이 {{$value | printf \"%.1f\"}}%입니다. 임계값: 85%"

    # MatchFit Backend Pod 메모리 매우 높음 (Critical: 95%)
    - alert: MatchFitBackendCriticalMemory
      expr: |
        (
          sum(container_memory_working_set_bytes{namespace="argocd", pod=~".*backend.*"}) by (pod)
          /
          sum(kube_pod_container_resource_limits{namespace="argocd", pod=~".*backend.*", resource="memory"}) by (pod)
        ) * 100 > 95
      for: 2m
      labels:
        severity: critical
        team: backend
        app: matchfit
        component: spring-boot
        environment: production
        service: matchfit-backend
      annotations:
        summary: "MatchFit Backend 메모리 부족 위험"
        description: "MatchFit Backend Pod {{$labels.pod}}의 메모리가 거의 소진되었습니다! ({{$value | printf \"%.1f\"}}%)"

    # MatchFit Backend 응답시간 높음 (P95 > 2초)
    - alert: MatchFitBackendHighResponseTime
      expr: |
        histogram_quantile(0.95,
          sum(rate(http_server_requests_seconds_bucket{job="argocd-argocd-backend"}[5m])) by (le, uri)
        ) > 2
      for: 10m
      labels:
        severity: warning
        team: backend
        app: matchfit
        component: spring-boot
        environment: production
        service: matchfit-backend
      annotations:
        summary: "MatchFit Backend 응답시간 저하"
        description: "MatchFit Backend API {{$labels.uri}}의 P95 응답시간이 {{$value | printf \"%.2f\"}}초입니다. 임계값: 2초"

    # MatchFit Backend 에러율 높음 (5xx > 5%)
    - alert: MatchFitBackendHighErrorRate
      expr: |
        sum(rate(http_server_requests_seconds_count{job="argocd-argocd-backend", status=~"5.."}[5m])) by (uri)
        /
        sum(rate(http_server_requests_seconds_count{job="argocd-argocd-backend"}[5m])) by (uri)
        * 100 > 5
      for: 5m
      labels:
        severity: critical
        team: backend
        app: matchfit
        component: spring-boot
        environment: production
        service: matchfit-backend
      annotations:
        summary: "MatchFit Backend 높은 에러율 감지"
        description: "MatchFit Backend API {{$labels.uri}}의 5xx 에러율이 {{$value | printf \"%.1f\"}}%입니다. 임계값: 5%"

    # MatchFit Backend JVM 힙 메모리 높음 (85%)
    - alert: MatchFitBackendHighJVMHeap
      expr: |
        (
          jvm_memory_used_bytes{job="argocd-argocd-backend", area="heap"}
          /
          jvm_memory_max_bytes{job="argocd-argocd-backend", area="heap"}
        ) * 100 > 85
      for: 5m
      labels:
        severity: warning
        team: backend
        app: matchfit
        component: spring-boot
        environment: production
        service: matchfit-backend
      annotations:
        summary: "MatchFit Backend JVM 힙 메모리 사용률 높음"
        description: "MatchFit Backend {{$labels.instance}}의 JVM 힙 사용률이 {{$value | printf \"%.1f\"}}%입니다. 임계값: 85%"

    # MatchFit Backend 서비스 다운
    - alert: MatchFitBackendDown
      expr: up{job="argocd-argocd-backend"} == 0
      for: 1m
      labels:
        severity: critical
        team: backend
        app: matchfit
        component: spring-boot
        environment: production
        service: matchfit-backend
      annotations:
        summary: "MatchFit Backend 서비스 다운"
        description: "MatchFit Backend 인스턴스 {{$labels.instance}}가 응답하지 않습니다."

    # MatchFit Backend GC 시간 높음
    - alert: MatchFitBackendHighGCTime
      expr: |
        increase(jvm_gc_collection_seconds_sum{job="argocd-argocd-backend"}[5m]) > 5
      for: 5m
      labels:
        severity: warning
        team: backend
        app: matchfit
        component: spring-boot
        environment: production
        service: matchfit-backend
      annotations:
        summary: "MatchFit Backend GC 시간 높음"
        description: "MatchFit Backend {{$labels.instance}}의 GC 시간이 지난 5분간 {{$value | printf \"%.1f\"}}초입니다."
