apiVersion: v1
kind: Service
metadata:
  name: argocd-server-metrics
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-server-metrics
spec:
  ports:
  - port: 8082
    targetPort: 8082
    name: metrics
    protocol: TCP
  selector:
    app.kubernetes.io/instance: argocd 
    app.kubernetes.io/name: argocd-server 
  type: ClusterIP
