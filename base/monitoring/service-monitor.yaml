apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: matchfit-backend
  namespace: argocd
  labels:
    app: backend
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
      scrapeTimeout: 10s
