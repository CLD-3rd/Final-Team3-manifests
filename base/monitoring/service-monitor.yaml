apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: matchfit-backend
  namespace: monitoring
  labels:
    app: matchfit
spec:
  selector:
    matchLabels:
      app: backend
  namespaceSelector:
    matchNames:
      - argocd
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
      scrapeTimeout: 10s