apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: matchfit-backend
  namespace: monitoring
  labels:
    app: matchfit
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  selector:
    matchLabels:
      app: backend
  namespaceSelector:
    matchNames:
      - argocd
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
      scrapeTimeout: 10s