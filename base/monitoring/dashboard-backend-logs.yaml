          "pluginVersion": "12.1.0",
          "targets": [
            {
              "datasource": {
                "type": "cloudwatch",
                "uid": "cloudwatch"
              },
              "dimensions": {},
              "expression": "fields @timestamp, @message |\nsort @timestamp desc |\nlimit 20",
              "id": "",
              "label": "",
              "logGroups": [
                {
                  "accountId": "061039804626",
                  "arn": "arn:aws:logs:ap-northeast-2:061039804626:log-group:/matchfit-fluentbit/logs:*",
                  "name": "/matchfit-fluentbit/logs"
                }
              ],
              "matchExact": true,
              "metricEditorMode": 0,
              "metricName": "",
              "metricQueryType": 0,
              "namespace": "",
              "period": "",
              "queryLanguage": "CWLI",
              "queryMode": "Logs",
              "refId": "A",
              "region": "ap-northeast-2",
              "sqlExpression": "",
              "statistic": "Average",
              "statsGroups": []
            }
          ],
          "title": "Latest 30 logs",
          "type": "logs"
        }
      ],
      "preload": false,
      "schemaVersion": 41,
      "tags": [],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-12h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "MatchFit Backend - Server logs",
      "uid": "a51e9c5b-2c71-467c-9961-1da71402e938",
      "version": 1
    }