apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prom-stack
  namespace: monitoring
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 58.0.1           # 사용하고자 하는 chart 버전
    helm:
      skipCrds: false      # ← 이 줄을 추가
      valueFiles:
        - values.yaml              # 아래에 정의할 값 파일
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
