apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: fluent-bit
  namespace: monitoring
  labels:
    app: fluentbit
spec:
  selector:
    matchLabels:
      app: fluentbit
  endpoints:
  - port: http
    path: /api/v1/metrics/prometheus
    interval: 30s
    scrapeTimeout: 10s
