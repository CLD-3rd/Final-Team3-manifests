apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: argocd
  labels:
    app: backend
spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 061039804626.dkr.ecr.ap-northeast-2.amazonaws.com/matchfit-ecr:latest
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: argocd-env-vars
