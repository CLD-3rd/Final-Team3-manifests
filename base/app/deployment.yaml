apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: argocd
  labels:
    app: backend
spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # serviceAccountName: s3-sa
      containers:
        - name: backend
          image: 061039804626.dkr.ecr.ap-northeast-2.amazonaws.com/matchfit-ecr:latest
          command: ["java"]
          args: ["-Duser.timezone=Asia/Seoul", "-jar", "app.jar"]
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: argocd-env-vars
