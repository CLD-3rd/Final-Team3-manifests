apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: argocd       # 위와 동일한 네임스페이스
  labels:
    app: backend
spec:
  type: ClusterIP         # NodePort 또는 LoadBalancer로 변경 가능
  selector:
    app: backend
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
