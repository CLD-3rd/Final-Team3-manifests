apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-ingress
  namespace: argocd
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: backend
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-northeast-2:061039804626:certificate/6beca310-1a10-4262-848e-119061924427
    external-dns.alpha.kubernetes.io/hostname: backend.match-fit.store
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health   # 이 부분 추가!
    
spec:
  ingressClassName: alb
  rules:
    - host: backend.match-fit.store
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-argocd-backend
                port:
                  number: 80
