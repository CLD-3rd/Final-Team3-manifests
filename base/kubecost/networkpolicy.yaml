apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kubecost-allow-monitoring
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app: cost-analyzer
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
  policyTypes:
    - Ingress
    - Egress
